<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SPORTTOOLS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --font-display: 'Space Grotesk', -apple-system, BlinkMacSystemFont, sans-serif;
      --bg-primary: #ffffff;
      --bg-dark: #0a0a0a;
      --border-light: #e8e8e8;
      --text-primary: #0a0a0a;
      --text-muted: #888888;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: var(--font-display);
      background: var(--bg-primary);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .header {
      background: var(--bg-dark);
      padding: 0 20px;
      flex-shrink: 0;
    }

    .header-inner {
      max-width: 1400px;
      margin: 0 auto;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .back-link {
      display: flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      color: #888;
      font-size: 13px;
      font-weight: 500;
      transition: color 0.15s ease;
    }

    .back-link:hover {
      color: white;
    }

    .back-link svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      color: white;
    }

    .logo svg {
      width: 20px;
      height: 20px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
    }

    .logo-text {
      font-size: 14px;
      font-weight: 600;
    }

    .tool-name {
      color: #888;
      font-size: 13px;
    }

    /* Tool Frame */
    .tool-frame {
      flex: 1;
      width: 100%;
      border: none;
      display: block;
    }

    /* Footer */
    .footer {
      background: var(--bg-primary);
      border-top: 1px solid var(--border-light);
      padding: 12px 20px;
      text-align: center;
      flex-shrink: 0;
    }

    .footer-text {
      font-size: 12px;
      color: var(--text-muted);
    }

    .footer-link {
      color: var(--text-primary);
      text-decoration: none;
      font-weight: 500;
    }

    .footer-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <a href="../../" class="back-link">
        <svg viewBox="0 0 24 24">
          <line x1="19" y1="12" x2="5" y2="12"/>
          <polyline points="12 19 5 12 12 5"/>
        </svg>
        Back to Tools
      </a>
      <a href="https://sporttools.io" target="_blank" class="logo">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"/>
          <path d="M12 2a10 10 0 0 1 0 20"/>
          <line x1="2" y1="12" x2="22" y2="12"/>
        </svg>
        <span class="logo-text">SPORTTOOLS</span>
      </a>
    </div>
  </header>

  <!-- Tool iframe -->
  <iframe src="tool.html" class="tool-frame" title="Tournament Manager"></iframe>

  <!-- Footer -->
  <footer class="footer">
    <p class="footer-text">
      Powered by <a href="https://sporttools.io" class="footer-link" target="_blank">SPORTTOOLS</a>
    </p>
  </footer>
</body>
</html>
